[build]
  publish = "app"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  included_files = ["agents/**", "skills/**", "headshots/**"]

[[redirects]]
  from = "/api/agents"
  to = "/.netlify/functions/agents"
  status = 200

[[redirects]]
  from = "/api/run"
  to = "/.netlify/functions/run-agents"
  status = 200

[[redirects]]
  from = "/api/thumbnail-options"
  to = "/.netlify/functions/thumbnail-options"
  status = 200
